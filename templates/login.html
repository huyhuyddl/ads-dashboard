<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>AdsAnalytics Pro — Đăng nhập</title>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --bg: #080f1e;
        --bg2: #0d1829;
        --bg3: #111f38;
        --accent: #1e88e5;
        --accent2: #00c9a7;
        --text: #e8edf5;
        --text2: #8b9bb4;
        --text3: #4a5a72;
        --border: rgba(255, 255, 255, 0.07);
        --card: rgba(255, 255, 255, 0.04);
        --danger: #ff4757;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: "DM Sans", sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        overflow: hidden;
      }
      .grid-bg {
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(rgba(30, 136, 229, 0.04) 1px, transparent 1px),
          linear-gradient(90deg, rgba(30, 136, 229, 0.04) 1px, transparent 1px);
        background-size: 40px 40px;
        pointer-events: none;
      }
      .glow {
        position: fixed;
        width: 600px;
        height: 600px;
        border-radius: 50%;
        background: radial-gradient(
          circle,
          rgba(30, 136, 229, 0.08) 0%,
          transparent 70%
        );
        top: -200px;
        right: -200px;
        pointer-events: none;
      }
      .glow2 {
        position: fixed;
        width: 400px;
        height: 400px;
        border-radius: 50%;
        background: radial-gradient(
          circle,
          rgba(0, 201, 167, 0.06) 0%,
          transparent 70%
        );
        bottom: -100px;
        left: -100px;
        pointer-events: none;
      }
      .card {
        background: var(--bg2);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 48px 44px;
        width: 100%;
        max-width: 420px;
        position: relative;
        z-index: 1;
        animation: fadeUp 0.5s ease;
      }
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .logo {
        text-align: center;
        margin-bottom: 36px;
      }
      .logo-text {
        font-size: 26px;
        font-weight: 600;
        letter-spacing: -0.5px;
      }
      .logo-text span {
        color: var(--accent);
      }
      .logo-sub {
        font-size: 13px;
        color: var(--text3);
        margin-top: 6px;
      }
      .form-group {
        margin-bottom: 18px;
      }
      label {
        display: block;
        font-size: 12px;
        color: var(--text2);
        margin-bottom: 7px;
        font-weight: 500;
        letter-spacing: 0.5px;
        text-transform: uppercase;
      }
      input {
        width: 100%;
        background: var(--bg3);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 12px 16px;
        color: var(--text);
        font-size: 14px;
        font-family: "DM Sans", sans-serif;
        outline: none;
        transition: all 0.2s;
      }
      input:focus {
        border-color: var(--accent);
        background: rgba(30, 136, 229, 0.06);
      }
      input::placeholder {
        color: var(--text3);
      }
      .btn {
        width: 100%;
        background: var(--accent);
        border: none;
        border-radius: 10px;
        padding: 13px;
        color: #fff;
        font-size: 15px;
        font-weight: 500;
        font-family: "DM Sans", sans-serif;
        cursor: pointer;
        transition: all 0.2s;
        margin-top: 8px;
        letter-spacing: 0.2px;
      }
      .btn:hover {
        background: #1976d2;
        transform: translateY(-1px);
      }
      .btn:active {
        transform: translateY(0);
      }
      .btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
      }
      .error {
        background: rgba(255, 71, 87, 0.1);
        border: 1px solid rgba(255, 71, 87, 0.3);
        border-radius: 8px;
        padding: 10px 14px;
        font-size: 13px;
        color: #ff8a95;
        margin-bottom: 16px;
        display: none;
      }
      .demo-hint {
        margin-top: 28px;
        padding-top: 24px;
        border-top: 1px solid var(--border);
      }
      .demo-title {
        font-size: 11px;
        color: var(--text3);
        text-align: center;
        margin-bottom: 12px;
        text-transform: uppercase;
        letter-spacing: 0.8px;
      }
      .demo-accounts {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .demo-acc {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 10px 14px;
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .demo-acc:hover {
        border-color: rgba(255, 255, 255, 0.15);
        background: rgba(255, 255, 255, 0.06);
      }
      .demo-acc-name {
        font-size: 13px;
        font-weight: 500;
      }
      .demo-acc-role {
        font-size: 11px;
        padding: 2px 8px;
        border-radius: 4px;
        font-weight: 500;
      }
      .role-admin {
        background: rgba(30, 136, 229, 0.15);
        color: var(--accent);
      }
      .role-user {
        background: rgba(0, 201, 167, 0.15);
        color: var(--accent2);
      }
      .demo-acc-pw {
        font-size: 11px;
        color: var(--text3);
        font-family: "JetBrains Mono", monospace;
      }
      .loading {
        display: inline-block;
        width: 16px;
        height: 16px;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        vertical-align: middle;
        margin-right: 6px;
        display: none;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="grid-bg"></div>
    <div class="glow"></div>
    <div class="glow2"></div>
    <div class="card">
      <div class="logo">
        <div class="logo-text">Ads<span>Analytics</span> Pro</div>
        <div class="logo-sub">Hệ thống theo dõi chi phí Marketing đa kênh</div>
      </div>
      <div class="error" id="err"></div>
      <div class="form-group">
        <label>Tên đăng nhập</label>
        <input
          type="text"
          id="username"
          placeholder="Nhập username..."
          autocomplete="username"
        />
      </div>
      <div class="form-group">
        <label>Mật khẩu</label>
        <input
          type="password"
          id="password"
          placeholder="Nhập mật khẩu..."
          autocomplete="current-password"
        />
      </div>
      <button class="btn" id="loginBtn" onclick="doLogin()">
        <span class="loading" id="loader"></span>Đăng nhập
      </button>
      <div class="demo-hint">
        <div class="demo-title">Tài khoản demo</div>
        <div class="demo-accounts">
          <div class="demo-acc" onclick="fillLogin('admin', 'admin123')">
            <div>
              <div class="demo-acc-name">admin</div>
              <div class="demo-acc-pw">admin123</div>
            </div>
            <span class="demo-acc-role role-admin">Admin</span>
          </div>
          <div class="demo-acc" onclick="fillLogin('nguyen_van_a', 'user123')">
            <div>
              <div class="demo-acc-name">nguyen_van_a</div>
              <div class="demo-acc-pw">user123</div>
            </div>
            <span class="demo-acc-role role-user">User</span>
          </div>
          <div class="demo-acc" onclick="fillLogin('tran_thi_b', 'user123')">
            <div>
              <div class="demo-acc-name">tran_thi_b</div>
              <div class="demo-acc-pw">user123</div>
            </div>
            <span class="demo-acc-role role-user">User</span>
          </div>
        </div>
      </div>
    </div>
    <script>
      function fillLogin(u, p) {
        document.getElementById("username").value = u;
        document.getElementById("password").value = p;
      }
      document.getElementById("password").addEventListener("keydown", (e) => {
        if (e.key === "Enter") doLogin();
      });
      async function doLogin() {
        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value;
        const err = document.getElementById("err");
        const btn = document.getElementById("loginBtn");
        const loader = document.getElementById("loader");
        err.style.display = "none";
        if (!username || !password) {
          err.textContent = "Vui lòng nhập đầy đủ thông tin";
          err.style.display = "block";
          return;
        }
        btn.disabled = true;
        loader.style.display = "inline-block";
        try {
          const res = await fetch("/api/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password }),
          });
          const data = await res.json();
          if (!res.ok) {
            err.textContent = data.error || "Đăng nhập thất bại";
            err.style.display = "block";
            return;
          }
          window.location.href =
            data.role === "admin" ? "/admin" : "/dashboard";
        } catch (e) {
          err.textContent = "Lỗi kết nối server";
          err.style.display = "block";
        } finally {
          btn.disabled = false;
          loader.style.display = "none";
        }
      }
    </script>
  </body>
</html>
